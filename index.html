<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PlayRole Builder</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.card-ratio { aspect-ratio: 4/5; }
.dragging { opacity: 0.5; }
</style>
</head>

<body class="bg-gray-100 font-sans">

<div class="p-4 space-y-4">

<!-- INPUTS -->
<div class="grid grid-cols-2 gap-2">
<input placeholder="Situación" class="p-2 border">
<input placeholder="Rol" class="p-2 border">
<input placeholder="Tema" class="p-2 border col-span-2">
<textarea placeholder="Desarrollo" class="p-2 border col-span-2"></textarea>
<input placeholder="Texto dorso" class="p-2 border col-span-2">
</div>

<!-- BOTONES -->
<div class="flex gap-2 flex-wrap">
<button id="crear" class="bg-black text-white px-3 py-2">Crear</button>
<button id="imgBtn" class="border px-3 py-2">Imagen dorso</button>
<button id="collectionBtn" class="border px-3 py-2">Collection</button>
</div>

<!-- PREVIEW -->
<div class="grid grid-cols-2 gap-4">

<div class="card-ratio bg-white border" id="front"></div>
<div class="card-ratio bg-black border" id="back"></div>

</div>

<!-- RECENT -->
<div class="overflow-x-auto flex gap-2 mt-4" id="carousel"></div>

</div>

<!-- EXPORT -->
<div class="fixed bottom-0 w-full bg-white p-3 border-t">
<button id="export" class="w-full bg-black text-white py-3">
Exportar PDF
</button>
</div>

<!-- COLLECTION MODAL -->
<div id="collectionModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
<div class="bg-white p-4 w-[90%] h-[80%] overflow-auto">
<h2 class="font-bold mb-2">Collection</h2>
<div id="collectionList"></div>
<button onclick="closeCollection()" class="mt-4 border px-3 py-1">Cerrar</button>
</div>
</div>

<script>

/* ================= STATE ================= */
let cards = JSON.parse(localStorage.getItem("cards")) || [];
let categories = JSON.parse(localStorage.getItem("categories")) || {};
let currentTheme = null;
let dorsoImage = null;

/* ================= SELECT ================= */
const inputs = document.querySelectorAll("input, textarea");
const front = document.getElementById("front");
const back = document.getElementById("back");
const carousel = document.getElementById("carousel");

/* ================= SAVE ================= */
function save() {
localStorage.setItem("cards", JSON.stringify(cards));
localStorage.setItem("categories", JSON.stringify(categories));
}

/* ================= GET DATA ================= */
function getData() {
return {
situacion: inputs[0].value,
rol: inputs[1].value,
tema: inputs[2].value,
desarrollo: inputs[3].value,
dorso: inputs[4].value,
image: dorsoImage
};
}

/* ================= PREVIEW ================= */
function renderPreview(d) {

front.innerHTML = `
<div class="w-full h-full flex flex-col justify-between p-2 text-[9pt]">
<div class="flex justify-between font-semibold">
<span>Situación ${d.situacion}</span>
<span>${d.rol}</span>
</div>
<div class="flex-1 flex items-center text-[8pt]">
${d.desarrollo}
</div>
<div class="border-t text-center text-[8pt] font-semibold">${d.tema}</div>
</div>
`;

back.innerHTML = `
<div class="w-full h-full flex items-center justify-center relative text-white">
${d.image ? `<img src="${d.image}" style="width:3cm;height:3cm;object-fit:cover;position:absolute;">` : ""}
<span>${d.dorso || "PLAYROLE"}</span>
</div>
`;
}

/* ================= CREATE ================= */
document.getElementById("crear").onclick = () => {

const d = getData();

if (!categories[d.tema]) categories[d.tema] = [];

categories[d.tema].push(d);
cards.push(d);

currentTheme = d.tema;

save();
renderPreview(d);
renderCarousel();

};

/* ================= CAROUSEL ================= */
function renderCarousel() {

carousel.innerHTML = "";

(categories[currentTheme] || []).forEach((c, i) => {

const el = document.createElement("div");
el.className = "card-ratio w-24 bg-white border flex items-center justify-center cursor-move";
el.draggable = true;
el.innerText = "#" + c.situacion;

el.onclick = () => renderPreview(c);

/* DRAG */
el.ondragstart = () => el.classList.add("dragging");
el.ondragend = () => {
el.classList.remove("dragging");
updateOrder();
};

carousel.appendChild(el);

});
}

/* ================= DRAG ORDER ================= */
carousel.ondragover = e => {
e.preventDefault();
const dragging = document.querySelector(".dragging");
const after = [...carousel.children].find(el => e.clientX < el.getBoundingClientRect().left + el.offsetWidth/2);
carousel.insertBefore(dragging, after);
};

function updateOrder() {
const newOrder = [...carousel.children].map(el => el.innerText.replace("#",""));
categories[currentTheme].sort((a,b)=> newOrder.indexOf(a.situacion) - newOrder.indexOf(b.situacion));
save();
}

/* ================= IMAGE ================= */
const file = document.createElement("input");
file.type = "file";
file.accept = "image/*";
file.style.display="none";
document.body.appendChild(file);

document.getElementById("imgBtn").onclick = () => file.click();

file.onchange = e => {
const reader = new FileReader();
reader.onload = ev => {
dorsoImage = ev.target.result;
renderPreview(getData());
};
reader.readAsDataURL(e.target.files[0]);
};

/* ================= COLLECTION ================= */
document.getElementById("collectionBtn").onclick = () => {

const list = document.getElementById("collectionList");
list.innerHTML = "";

Object.keys(categories).forEach(cat => {

const div = document.createElement("div");
div.innerHTML = `<b>${cat}</b> (${categories[cat].length})`;
div.className = "cursor-pointer mb-2";

div.onclick = () => {
currentTheme = cat;
renderCarousel();
closeCollection();
};

list.appendChild(div);

});

document.getElementById("collectionModal").classList.remove("hidden");
};

function closeCollection() {
document.getElementById("collectionModal").classList.add("hidden");
}

/* ================= EXPORT PRO ================= */
document.getElementById("export").onclick = () => {

const list = categories[currentTheme] || [];
const win = window.open("", "_blank");

let html = `
<html><head><style>
@page{size:A4;margin:0;}
body{margin:0;font-family:sans-serif;}

.sheet{
width:21cm;height:29.7cm;display:grid;
grid-template-columns:repeat(2,8cm);
grid-auto-rows:10cm;
gap:0.4cm;
justify-content:center;
align-content:center;
page-break-after:always;
}

.card{
border:1px solid black;
padding:4mm;
display:flex;
flex-direction:column;
justify-content:space-between;
font-size:9pt;
position:relative;
}

.mark{position:absolute;width:6mm;height:6mm;border:1px solid;}
.tl{top:-3mm;left:-3mm;border-right:none;border-bottom:none;}
.tr{top:-3mm;right:-3mm;border-left:none;border-bottom:none;}
.bl{bottom:-3mm;left:-3mm;border-right:none;border-top:none;}
.br{bottom:-3mm;right:-3mm;border-left:none;border-top:none;}

.back{background:black;color:white;display:flex;align-items:center;justify-content:center;}
.img{width:3cm;height:3cm;object-fit:cover;position:absolute;}
</style></head><body>
`;

for (let i=0;i<list.length;i+=4){
html+=`<div class="sheet">`;

list.slice(i,i+4).forEach(c=>{
html+=`
<div class="card">
<div><b>Situación ${c.situacion}</b> ${c.rol}</div>
<div>${c.desarrollo}</div>
<div>${c.tema}</div>
<div class="mark tl"></div><div class="mark tr"></div><div class="mark bl"></div><div class="mark br"></div>
</div>`;
});

html+=`</div>`;
}

for (let i=0;i<list.length;i+=4){
html+=`<div class="sheet">`;

list.slice(i,i+4).reverse().forEach(c=>{
html+=`
<div class="card back">
${c.image?`<img src="${c.image}" class="img">`:""}
<span>${c.dorso}</span>
<div class="mark tl"></div><div class="mark tr"></div><div class="mark bl"></div><div class="mark br"></div>
</div>`;
});

html+=`</div>`;
}

html+=`</body></html>`;

win.document.write(html);
win.document.close();
win.print();

};

/* ================= LIVE PREVIEW ================= */
inputs.forEach(i => i.oninput = () => renderPreview(getData()));

</script>
</body>
</html>
