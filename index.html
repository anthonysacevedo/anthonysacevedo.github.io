<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PlayRole Cards</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }
.card-ratio { aspect-ratio: 8 / 10; }
</style>
</head>

<body class="bg-gray-100 p-6">

<div class="grid grid-cols-2 gap-6">

<!-- FORM -->
<div>
<input id="situacion" type="number" placeholder="Situación" class="w-full mb-2 p-2 border">
<input id="rol" type="text" placeholder="Rol" class="w-full mb-2 p-2 border">
<input id="tema" type="text" placeholder="Tema" class="w-full mb-2 p-2 border">
<textarea id="desarrollo" placeholder="Desarrollo" class="w-full mb-2 p-2 border"></textarea>
<input id="dorso" type="text" placeholder="Texto dorso" class="w-full mb-2 p-2 border">

<button onclick="createCard()" class="bg-black text-white px-4 py-2">Crear</button>
<button onclick="exportPDF()" class="bg-blue-600 text-white px-4 py-2">Exportar A4</button>
</div>

<!-- PREVIEW -->
<div class="grid grid-cols-2 gap-4">
<div id="front" class="card-ratio bg-white border shadow p-2"></div>
<div id="back" class="card-ratio bg-black text-white flex items-center justify-center"></div>
</div>

</div>

<!-- CARRUSEL -->
<div class="flex gap-3 mt-6 overflow-x-auto" id="carousel"></div>

<script>

/* ================= STATE ================= */
let cards = [];

/* ================= INPUT ================= */
function getInputs() {
    return {
        situacion: document.getElementById("situacion").value,
        rol: document.getElementById("rol").value,
        tema: document.getElementById("tema").value,
        desarrollo: document.getElementById("desarrollo").value,
        dorso: document.getElementById("dorso").value
    };
}

/* ================= PREVIEW ================= */
function renderPreview(data) {

    document.getElementById("front").innerHTML = `
        <div style="height:100%;display:flex;flex-direction:column;justify-content:space-between;font-size:9pt;">
            <div style="display:flex;justify-content:space-between;font-weight:600;">
                <span>Situación ${data.situacion || ""}</span>
                <span>${data.rol || ""}</span>
            </div>

            <div style="flex:1;display:flex;align-items:center;">
                <p style="font-size:8pt;line-height:1.2;">
                    ${data.desarrollo || ""}
                </p>
            </div>

            <div style="text-align:center;border-top:1px solid #000;padding-top:2px;">
                <span style="font-size:8pt;font-weight:600;">
                    ${data.tema || ""}
                </span>
            </div>
        </div>
    `;

    document.getElementById("back").innerHTML = `
        <div style="font-size:9pt;font-weight:700;">
            ${data.dorso || "PLAYROLE"}
        </div>
    `;
}

/* ================= CREATE ================= */
function createCard() {
    const data = getInputs();
    cards.push(data);
    renderPreview(data);
    renderCarousel();
}

/* ================= CAROUSEL ================= */
function renderCarousel() {
    const container = document.getElementById("carousel");
    container.innerHTML = "";

    cards.forEach((card, i) => {
        const el = document.createElement("div");
        el.className = "w-20 h-28 bg-white border flex items-center justify-center cursor-pointer text-xs";
        el.innerHTML = `#${card.situacion}`;

        el.onclick = () => renderPreview(card);

        container.appendChild(el);
    });
}

/* ================= EXPORT A4 ================= */
function exportPDF() {

    const win = window.open("", "_blank");

    let html = `
    <html>
    <head>
    <style>
    @page { size: A4; margin: 1cm; }

    body {
        margin: 0;
        font-family: Inter;
    }

    .page {
        width: 21cm;
        height: 29.7cm;
        display: grid;
        grid-template-columns: repeat(2, 8cm);
        grid-auto-rows: 10cm;
        gap: 0.5cm;
        justify-content: center;
        align-content: start;
        page-break-after: always;
    }

    .card {
        width: 8cm;
        height: 10cm;
        border: 1px solid black;
        box-sizing: border-box;
        padding: 5mm;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        font-size: 9pt;
    }

    .footer {
        border-top: 1px solid black;
        text-align: center;
        font-size: 8pt;
        font-weight: 600;
    }

    </style>
    </head>
    <body>
    `;

    /* ===== FRONT PAGES ===== */
    for (let i = 0; i < cards.length; i += 4) {
        html += `<div class="page">`;

        cards.slice(i, i + 4).forEach(card => {
            html += `
            <div class="card">
                <div style="display:flex;justify-content:space-between;font-weight:600;">
                    <span>Situación ${card.situacion}</span>
                    <span>${card.rol}</span>
                </div>

                <div style="font-size:8pt;">
                    ${card.desarrollo}
                </div>

                <div class="footer">${card.tema}</div>
            </div>
            `;
        });

        html += `</div>`;
    }

    /* ===== BACK PAGES ===== */
    for (let i = 0; i < cards.length; i += 4) {
        html += `<div class="page">`;

        cards.slice(i, i + 4).forEach(card => {
            html += `
            <div class="card" style="background:black;color:white;align-items:center;justify-content:center;">
                ${card.dorso || "PLAYROLE"}
            </div>
            `;
        });

        html += `</div>`;
    }

    html += "</body></html>";

    win.document.write(html);
    win.document.close();
    win.print();
}

/* ================= LIVE ================= */
document.querySelectorAll("input, textarea").forEach(el => {
    el.addEventListener("input", () => renderPreview(getInputs()));
});

</script>

</body>
</html>
